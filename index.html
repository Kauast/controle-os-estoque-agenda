<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Controle OS e Estoque</title>
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#17191c",
              muted: "#68707b",
              line: "#dfe3e8",
              panel: "#ffffff",
              soft: "#f6f7f9",
              dark: "#0f1114",
              teal: "#127d75",
              amber: "#b47a13",
              red: "#b73535"
            },
            boxShadow: {
              panel: "0 16px 36px rgba(25, 29, 35, 0.08)",
              lift: "0 18px 40px rgba(25, 29, 35, 0.13)"
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        color: #17191c;
        background: linear-gradient(135deg, rgba(15, 17, 20, 0.04), rgba(18, 125, 117, 0.05)), #f6f7f9;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button:focus-visible,
      a:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(18, 125, 117, 0.18);
      }

      .thin-scroll {
        scrollbar-width: thin;
        scrollbar-color: #c7ced8 transparent;
      }

      .signature-pad {
        touch-action: none;
      }

      .bg-dark { background-color: #0f1114; }
      .bg-panel { background-color: #ffffff; }
      .bg-soft { background-color: #f6f7f9; }
      .bg-teal { background-color: #127d75; }
      .text-ink { color: #17191c; }
      .text-muted { color: #68707b; }
      .text-teal { color: #127d75; }
      .text-amber { color: #b47a13; }
      .text-red { color: #b73535; }
      .border-line { border-color: #dfe3e8; }
      .border-teal { border-color: #127d75; }
      .border-amber { border-color: #b47a13; }
      .border-red { border-color: #b73535; }
      .border-l-teal { border-left-color: #127d75; }
      .border-l-amber { border-left-color: #b47a13; }
      .border-l-red { border-left-color: #b73535; }
      .bg-teal\/10 { background-color: rgba(18, 125, 117, 0.1); }
      .bg-amber\/10 { background-color: rgba(180, 122, 19, 0.1); }
      .bg-red\/10 { background-color: rgba(183, 53, 53, 0.1); }
      .bg-dark\/45 { background-color: rgba(15, 17, 20, 0.45); }
      .border-teal\/20 { border-color: rgba(18, 125, 117, 0.2); }
      .border-teal\/30 { border-color: rgba(18, 125, 117, 0.3); }
      .border-amber\/20 { border-color: rgba(180, 122, 19, 0.2); }
      .border-amber\/30 { border-color: rgba(180, 122, 19, 0.3); }
      .border-red\/20 { border-color: rgba(183, 53, 53, 0.2); }
      .shadow-panel { box-shadow: 0 16px 36px rgba(25, 29, 35, 0.08); }
      .shadow-lift { box-shadow: 0 18px 40px rgba(25, 29, 35, 0.13); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="env,react" src="./src/App.jsx?v=react-tailwind-2"></script>
  </body>
</html>
